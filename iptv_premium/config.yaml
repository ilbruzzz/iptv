name: "IPTV Premium"
version: "0.1.0"
slug: "iptv_premium"
description: "Advanced IPTV add-on with Xtream backend and premium UI"
url: "https://github.com/ilbruzzz/iptv"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:television-play
panel_title: IPTV Premium
map:
  - addon_config:rw
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "IPTV Premium web interface and API"
options:
  xtream_url: ""
  xtream_username: ""
  xtream_password: ""
  stream_format: "m3u8"
  playback_autoplay: true
  playback_muted: false
  playback_volume: 0.8
  playback_live_format: "m3u8"
  playback_vod_format: "mp4"
schema:
  xtream_url: str
  xtream_username: str
  xtream_password: password
  stream_format: list(m3u8|ts)
  playback_autoplay: bool
  playback_muted: bool
  playback_volume: float(0,1)
  playback_live_format: list(m3u8|ts)
  playback_vod_format: list(mp4|mkv|m3u8)
