<!doctype html>
<html lang="it" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              premium: {
                900: "#0B0D10",
                800: "#11141A",
                700: "#171C24",
                600: "#1F2530",
                accent: "#6D5DF6"
              }
            },
            boxShadow: {
              soft: "0 10px 35px -12px rgba(0, 0, 0, 0.75)",
              glass: "0 8px 25px -12px rgba(109, 93, 246, 0.35)"
            }
          }
        }
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(1000px 500px at 10% -15%, rgba(109, 93, 246, 0.2), transparent 60%),
          radial-gradient(900px 450px at 95% 5%, rgba(0, 184, 212, 0.12), transparent 60%),
          #0b0d10;
      }

      .glass {
        background: rgba(17, 20, 26, 0.65);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body class="h-full text-slate-100">
    <div class="min-h-screen w-full">
      <div class="mx-auto flex min-h-screen max-w-[1600px] gap-5 p-4 md:p-6 lg:p-8">
        <aside class="glass hidden w-64 shrink-0 rounded-3xl p-5 shadow-soft md:flex md:flex-col">
          <div class="mb-8 flex items-center gap-3">
            <div class="rounded-xl bg-premium-accent/20 p-2 text-premium-accent shadow-glass">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.55-2.275A1 1 0 0121 8.618v6.764a1 1 0 01-1.45.893L15 14m-6 4h5a2 2 0 002-2V8a2 2 0 00-2-2H9a2 2 0 00-2 2v8a2 2 0 002 2z" />
              </svg>
            </div>
            <div>
              <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Addon</p>
              <h1 class="text-lg font-semibold">IPTV Premium</h1>
            </div>
          </div>

          <nav id="sidebarNav" class="space-y-2">
            <button data-section="home" class="nav-item w-full rounded-xl px-4 py-3 text-left transition-all duration-300">Home</button>
            <button data-section="live" class="nav-item w-full rounded-xl px-4 py-3 text-left transition-all duration-300">Canali Live</button>
            <button data-section="vod" class="nav-item w-full rounded-xl px-4 py-3 text-left transition-all duration-300">Film</button>
            <button data-section="series" class="nav-item w-full rounded-xl px-4 py-3 text-left transition-all duration-300">Serie TV</button>
            <button data-section="settings" class="nav-item w-full rounded-xl px-4 py-3 text-left transition-all duration-300">Impostazioni</button>
          </nav>
        </aside>

        <main class="flex-1 space-y-6">
          <section class="glass rounded-3xl p-6 shadow-soft md:p-8">
            <div class="flex flex-wrap items-start justify-between gap-4">
              <div class="max-w-2xl space-y-3">
                <p class="inline-flex rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs uppercase tracking-[0.22em] text-slate-300">
                  Streaming Hub
                </p>
                <h2 class="text-3xl font-bold leading-tight md:text-4xl">
                  Esperienza IPTV moderna, fluida e cinematografica
                </h2>
                <p id="heroDescription" class="text-sm text-slate-300 md:text-base">
                  Seleziona una sezione dal menu per caricare i dati reali dal backend Xtream.
                </p>
              </div>
              <div class="glass rounded-2xl p-4 text-right shadow-glass">
                <p class="text-xs uppercase tracking-[0.22em] text-slate-400">Stato API</p>
                <p id="apiStatus" class="mt-1 text-base font-medium text-emerald-300">Pronto</p>
              </div>
            </div>
          </section>

          <section class="glass rounded-3xl p-5 shadow-soft md:hidden">
            <nav id="mobileNav" class="grid grid-cols-2 gap-2">
              <button data-section="home" class="nav-item rounded-xl px-4 py-3 text-left transition-all duration-300">Home</button>
              <button data-section="live" class="nav-item rounded-xl px-4 py-3 text-left transition-all duration-300">Canali Live</button>
              <button data-section="vod" class="nav-item rounded-xl px-4 py-3 text-left transition-all duration-300">Film</button>
              <button data-section="series" class="nav-item rounded-xl px-4 py-3 text-left transition-all duration-300">Serie TV</button>
              <button data-section="settings" class="nav-item rounded-xl px-4 py-3 text-left transition-all duration-300">Impostazioni</button>
            </nav>
          </section>

          <section id="settingsPanel" class="glass hidden rounded-3xl p-5 shadow-soft md:p-6">
            <div class="mb-4 flex items-center justify-between">
              <h3 class="text-lg font-semibold">Impostazioni Add-on</h3>
              <p id="settingsStatus" class="text-xs text-slate-300">Caricamento...</p>
            </div>

            <form id="settingsForm" class="grid grid-cols-1 gap-4 lg:grid-cols-2">
              <label class="space-y-1">
                <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Xtream URL</span>
                <input id="xtreamUrl" class="w-full rounded-xl border border-white/15 bg-black/20 px-3 py-2 outline-none transition-all duration-300 focus:border-premium-accent/70" />
              </label>
              <label class="space-y-1">
                <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Username</span>
                <input id="xtreamUsername" class="w-full rounded-xl border border-white/15 bg-black/20 px-3 py-2 outline-none transition-all duration-300 focus:border-premium-accent/70" />
              </label>
              <label class="space-y-1 lg:col-span-2">
                <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Password (lascia ******** per non cambiare)</span>
                <input id="xtreamPassword" type="password" class="w-full rounded-xl border border-white/15 bg-black/20 px-3 py-2 outline-none transition-all duration-300 focus:border-premium-accent/70" />
              </label>
              <label class="space-y-1">
                <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Formato Live</span>
                <select id="playbackLiveFormat" class="w-full rounded-xl border border-white/15 bg-black/20 px-3 py-2 outline-none transition-all duration-300 focus:border-premium-accent/70">
                  <option value="m3u8">m3u8</option>
                  <option value="ts">ts</option>
                </select>
              </label>
              <label class="space-y-1">
                <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Formato VOD</span>
                <select id="playbackVodFormat" class="w-full rounded-xl border border-white/15 bg-black/20 px-3 py-2 outline-none transition-all duration-300 focus:border-premium-accent/70">
                  <option value="mp4">mp4</option>
                  <option value="mkv">mkv</option>
                  <option value="m3u8">m3u8</option>
                </select>
              </label>
              <label class="space-y-2">
                <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Volume default</span>
                <input id="playbackVolume" type="range" min="0" max="1" step="0.05" class="w-full accent-premium-accent" />
              </label>
              <label class="flex items-center gap-2 pt-4">
                <input id="playbackAutoplay" type="checkbox" class="h-4 w-4 rounded accent-premium-accent" />
                <span class="text-sm text-slate-300">Autoplay</span>
              </label>
              <label class="flex items-center gap-2 pt-4">
                <input id="playbackMuted" type="checkbox" class="h-4 w-4 rounded accent-premium-accent" />
                <span class="text-sm text-slate-300">Muted all'avvio</span>
              </label>
              <div class="lg:col-span-2">
                <button type="submit" class="rounded-xl border border-premium-accent/40 bg-premium-accent/20 px-5 py-2 text-sm font-semibold transition-all duration-300 hover:bg-premium-accent/35">
                  Salva impostazioni
                </button>
              </div>
            </form>
          </section>

          <section class="space-y-4">
            <div class="flex items-center justify-between px-1">
              <h3 id="gridTitle" class="text-xl font-semibold">In evidenza</h3>
              <span class="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs text-slate-300">
                Skeleton UI
              </span>
            </div>
            <div id="posterGrid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6">
            </div>
          </section>
        </main>
      </div>
    </div>

    <div id="playerModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-4">
      <div class="w-full max-w-5xl overflow-hidden rounded-2xl border border-white/10 bg-black shadow-soft">
        <div class="flex items-center justify-between border-b border-white/10 px-4 py-3">
          <h3 id="playerTitle" class="text-sm font-semibold">Player</h3>
          <button id="closePlayer" class="rounded-lg border border-white/15 px-3 py-1 text-xs text-slate-200 transition-all duration-300 hover:bg-white/10">Chiudi</button>
        </div>
        <video id="videoPlayer" class="h-[65vh] w-full bg-black" controls playsinline></video>
        <div id="epgPanel" class="hidden border-t border-white/10 bg-premium-900/70 px-4 py-3">
          <p class="mb-2 text-xs uppercase tracking-[0.18em] text-slate-400">EPG Diretta</p>
          <div id="epgList" class="space-y-2 text-sm text-slate-200"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="./app.js"></script>
  </body>
</html>
